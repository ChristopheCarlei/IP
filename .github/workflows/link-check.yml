# Vérifie chaque mois les liens externes des fiches projets et ouvre
# une issue GitHub listant les liens cassés. Lançable aussi à la main
# depuis l'onglet Actions (workflow_dispatch).
name: Vérification des liens

on:
  schedule:
    - cron: '0 6 1 * *' # le 1er de chaque mois à 6h UTC
  workflow_dispatch:

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Contrôle des liens (lychee)
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --timeout 30
            --max-retries 2
            --accept 200,201,202,203,204,206,301,302,303,304,307,308,403,429
            'src/content/**/*.md'
          fail: false

      - name: Ouvrir une issue si liens cassés
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Liens cassés détectés dans les fiches projets'
          content-filepath: ./lychee/out.md
          labels: liens-casses
